# .github/workflows/ci.yml
# Pipeline DevSecOps complet

name: DevSecOps Pipeline

# Déclencheurs : à chaque push ou pull request sur main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 : Lint des fichiers YAML
  # ─────────────────────────────────────────────
  yaml-lint:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer yamllint
        run: pip install yamllint

      - name: Linter les fichiers YAML
        run: yamllint k8s-deployment.yaml .yamllint.yml

  # ─────────────────────────────────────────────
  # JOB 2 : Build de l'image Docker
  # ─────────────────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: yaml-lint
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Construire l'image Docker
        run: docker build -t devsecops-api:latest .

  # ─────────────────────────────────────────────
  # JOB 3 : Scan Trivy des dépendances (filesystem)
  # ─────────────────────────────────────────────
  trivy-fs-scan:
    name: Trivy - Scan Dépendances
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Scanner les dépendances avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'          # 0 = ne fait PAS échouer le pipeline (pour le TP)
          severity: 'CRITICAL,HIGH,MEDIUM'

  # ─────────────────────────────────────────────
  # JOB 4 : Scan Trivy de l'image Docker
  # ─────────────────────────────────────────────
  trivy-image-scan:
    name: Trivy - Scan Image Docker
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Reconstruire l'image pour le scan
        run: docker build -t devsecops-api:latest .

      - name: Scanner l'image Docker avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'devsecops-api:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH,MEDIUM'

  # ─────────────────────────────────────────────
  # JOB 5 : Vérification Conftest (politique sécurité)
  # ─────────────────────────────────────────────
  conftest-policy:
    name: Conftest - Politique Kubernetes
    runs-on: ubuntu-latest
    needs: yaml-lint
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.46.0/conftest_0.46.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.46.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Vérifier la politique de sécurité Kubernetes
        run: conftest test k8s-deployment.yaml --policy policy/
        # ← Ce step VA ÉCHOUER car notre YAML contient runAsUser=0
        # C'est voulu ! Cela démontre que la règle fonctionne.
        continue-on-error: true   # On laisse le pipeline continuer pour voir tous les résultats
