# k8s-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-api
  labels:
    app: devsecops-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devsecops-api
  template:
    metadata:
      labels:
        app: devsecops-api
    spec:
      containers:
        - name: api
          image: devsecops-api:latest
          ports:
            - containerPort: 3000
          securityContext:
            runAsUser: 0      # ← MAUVAISE PRATIQUE : tourne en root !
            runAsNonRoot: false
